<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2026년 경영지원실 주간업무 대시보드</title>
<style>
  :root{
    --ink:#1f2937;
    --sub:#6b7280;
    --faint:#9aa2ad;
    --line:#e5e8ec;
    --bg:#f6f7f9;
    --card:#ffffff;
    --accent:#3b5580;
    --accent-soft:#eef2f8;
    --last-bg:#f4f5f7;
    --next-bg:#eef3fb;
    --ok:#7c8591;
    --prog:#3b5580;
    --wait:#a6741f;
    --plan:#4f7a68;
    --hold:#a83a3a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard','Noto Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:1440px;margin:0 auto;padding:40px 32px 80px;}

  .now-bar{display:flex;justify-content:flex-end;align-items:center;gap:6px;margin-bottom:14px;font-size:12.5px;color:var(--sub);font-weight:600;}
  .now-bar .now-date{color:var(--ink);}
  .now-bar .now-dot{color:var(--faint);}
  .now-bar .now-time{color:var(--accent);font-variant-numeric:tabular-nums;}

  /* header */
  .head-row{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
  .title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 6px;}
  h1{font-size:22px;font-weight:700;margin:0;letter-spacing:-0.01em;}
  .sub{color:var(--sub);font-size:13.5px;margin:0;}
  .head-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .week-tag-row{display:flex;align-items:center;gap:8px;}
  .week-tag{font-size:12px;color:var(--accent);background:var(--accent-soft);padding:5px 12px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .archive-badge{font-size:11px;color:var(--hold);background:#fbecec;padding:4px 10px;border-radius:20px;font-weight:700;white-space:nowrap;display:none;}
  .archive-badge.show{display:inline-block;}
  .week-select{font-size:11px;color:var(--sub);background:var(--card);border:1px solid var(--line);border-radius:8px;padding:4px 8px;cursor:pointer;}
  .sync-row{display:flex;align-items:center;gap:8px;}
  .sync-time{font-size:11px;color:var(--faint);}
  .refresh-btn{font-size:11px;color:var(--accent);background:none;border:1px solid var(--line);border-radius:20px;padding:4px 10px;cursor:pointer;font-weight:600;}
  .refresh-btn:hover{border-color:var(--accent);}
  .refresh-btn:disabled{opacity:.5;cursor:default;}

  .search-row{margin-bottom:14px;position:relative;}
  .search-input{width:100%;font-size:13.5px;padding:11px 40px 11px 14px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--ink);}
  .search-input:focus{outline:none;border-color:var(--accent);}
  .search-input::placeholder{color:var(--faint);}
  .search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--faint);font-size:16px;cursor:pointer;padding:4px 6px;display:none;line-height:1;}
  .search-clear.show{display:block;}
  .search-clear:hover{color:var(--hold);}

  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:28px;}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 14px;text-align:center;}
  .kpi .num{font-size:26px;font-weight:700;color:var(--ink);line-height:1.1;}
  .kpi .lbl{font-size:11.5px;color:var(--sub);margin-top:6px;font-weight:600;}
  .kpi.total .num{color:var(--accent);}
  .kpi.prog .num{color:var(--prog);}
  .kpi.wait .num{color:var(--wait);}
  .kpi.overdue .num{color:var(--hold);}

  /* filter bar */
  .filters-row{display:flex;flex-direction:column;gap:10px;margin-bottom:18px;}
  .filter-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .filter-label{font-size:11.5px;color:var(--faint);font-weight:700;white-space:nowrap;min-width:38px;}
  .filters{display:flex;gap:8px;flex-wrap:wrap;flex:1;}
  .chip{border:1px solid var(--line);background:var(--card);color:var(--sub);font-size:12.5px;font-weight:600;
        padding:7px 14px;border-radius:20px;cursor:pointer;user-select:none;transition:.15s;}
  .chip:hover{border-color:var(--accent);color:var(--accent);}
  .chip.active{background:var(--ink);border-color:var(--ink);color:#fff;}
  .owner-chip.active{background:var(--accent);border-color:var(--accent);}
  .toggle-all-btn{font-size:12.5px;color:var(--accent);background:var(--accent-soft);border:1px solid transparent;border-radius:20px;padding:7px 14px;cursor:pointer;font-weight:600;white-space:nowrap;}
  .toggle-all-btn:hover{border-color:var(--accent);}

  /* task cards */
  .flow .box{border-radius:10px;padding:11px 13px;font-size:12.5px;line-height:1.55;color:var(--ink);font-weight:500;}
  .flow .box .lbl{display:block;font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.03em;margin-bottom:5px;text-transform:uppercase;}
  .flow .last{background:#eceef1;border:1px solid #dde0e5;}
  .flow .next{background:#e3ebf7;border:1px solid #cbdaef;}
  .flow .arrow{display:flex;align-items:center;justify-content:center;color:var(--faint);font-size:14px;}
  .empty{color:var(--faint);font-style:italic;}
  .remark{border-radius:10px;padding:10px 13px;font-size:12px;line-height:1.6;color:#5b5240;background:#fbf7ee;border:1px solid #ecdfc0;white-space:pre-line;}
  .remark .lbl{display:block;font-size:10px;font-weight:800;color:var(--wait);letter-spacing:.03em;margin-bottom:4px;text-transform:uppercase;}
  .flow .box.remark{background:#fbf7ee;border:1px solid #ecdfc0;color:#5b5240;white-space:pre-line;margin-top:0;}
  .flow .box.remark .lbl{color:var(--wait);}
  mark{background:#fde9a8;color:inherit;border-radius:3px;padding:0 1px;}

  .dept-section{margin-bottom:32px;}
  .dept-section:last-child{margin-bottom:0;}
  .dept-header{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--ink);cursor:pointer;list-style:none;user-select:none;}
  .dept-header::-webkit-details-marker{display:none;}
  .dept-header .dept-chevron{font-size:11px;color:var(--faint);transition:transform .15s;}
  .dept-section[open] .dept-header .dept-chevron{transform:rotate(90deg);}
  .dept-section:not([open]) .dept-header{margin-bottom:0;}
  .dept-header .dept-name{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-0.01em;}
  .dept-header .dept-count{font-size:12px;color:var(--sub);font-weight:600;background:#f0f1f3;padding:2px 10px;border-radius:12px;}
  .dept-expand-btn{margin-left:auto;font-size:11.5px;color:var(--accent);background:var(--accent-soft);border:1px solid transparent;border-radius:20px;padding:5px 12px;cursor:pointer;font-weight:600;white-space:nowrap;}
  .dept-expand-btn:hover{border-color:var(--accent);}
  .dept-header:hover .dept-name{color:var(--accent);}

  .owner-group{margin-bottom:14px;}
  .owner-group:last-child{margin-bottom:0;}
  .owner-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding-left:2px;}
  .owner-header .owner-name{font-size:13px;font-weight:700;color:var(--accent);}
  .owner-header .owner-count{font-size:11px;color:var(--faint);font-weight:600;}
  .owner-header::after{content:"";flex:1;height:1px;background:var(--line);}

  .task{background:var(--card);border:1px solid var(--line);border-radius:12px;margin-bottom:8px;overflow:hidden;}
  .task[open]{padding-bottom:4px;}
  .task summary{list-style:none;cursor:pointer;padding:13px 16px;}
  .task summary::-webkit-details-marker{display:none;}
  .task-top{display:grid;grid-template-columns:96px minmax(0,1fr) 90px 118px 14px;align-items:center;column-gap:10px;}
  .task-top .chevron{font-size:11px;color:var(--faint);transition:transform .15s;justify-self:end;}
  .task[open] .chevron{transform:rotate(90deg);}
  .tag{font-size:11px;font-weight:700;color:var(--sub);background:#f0f1f3;padding:3px 9px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;justify-self:center;max-width:100%;}
  .title{font-size:15.5px;font-weight:800;color:var(--ink);letter-spacing:-0.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .due{font-size:11.5px;color:var(--faint);white-space:nowrap;text-align:left;justify-self:start;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
  .due.soon{color:var(--wait);font-weight:700;}
  .due.overdue{color:var(--hold);font-weight:700;}
  .status{font-size:11.5px;font-weight:700;padding:3px 10px;border-radius:20px;text-align:center;justify-self:center;white-space:nowrap;}
  .status.진행중{color:var(--prog);background:#eaf0f9;}
  .status.완료{color:var(--ok);background:#eef0f2;}
  .status.확인중{color:var(--wait);background:#faf3e6;}
  .status.예정{color:var(--plan);background:#eaf3ef;}
  .status.보류{color:var(--hold);background:#fbecec;}

  .task-body{padding:0 16px 16px;}
  .desc{font-size:14px;color:#3f4654;font-weight:500;margin:0 0 14px;line-height:1.7;white-space:pre-line;padding:12px 14px;background:#fafbfc;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;}

  .state-msg{text-align:center;color:var(--sub);font-size:13px;padding:60px 0;}
  .state-msg.error{color:var(--hold);}

  /* summary table view */
  .table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--card);}
  .summary-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:900px;}
  .summary-table th{background:#f7f8fa;color:var(--sub);font-weight:700;font-size:11px;text-align:left;
        padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0;}
  .summary-table td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top;
        white-space:pre-line;line-height:1.55;color:var(--ink);}
  .summary-table tbody tr:last-child td{border-bottom:none;}
  .summary-table tbody tr:hover{background:#fafbfc;}
  .summary-table td.dept-cell{color:var(--sub);font-weight:700;white-space:nowrap;}
  .summary-table td.owner-cell{color:var(--accent);font-weight:700;white-space:nowrap;}
  .summary-table td.title-cell{font-weight:800;color:var(--ink);}
  .summary-table td.empty-cell{color:var(--faint);font-style:italic;}
  .summary-table col.col-dept{width:6%;}
  .summary-table col.col-owner{width:7%;}
  .summary-table col.col-title{width:13%;}
  .summary-table col.col-flow{width:24.67%;}

  @media(max-width:720px){
    .kpis{grid-template-columns:repeat(3,1fr);}
    .flow{grid-template-columns:1fr;}
    .flow .arrow{transform:rotate(90deg);padding:4px 0;}
    .head-row{flex-direction:column;align-items:flex-start;}
    .head-right{align-items:flex-start;}
    .task-top{
      display:grid;
      grid-template-columns:1fr auto;
      grid-template-areas:"tag chevron" "title title" "status due";
      row-gap:6px;column-gap:8px;
    }
    .task-top .tag{grid-area:tag;justify-self:start;}
    .task-top .chevron{grid-area:chevron;justify-self:end;}
    .task-top .title{grid-area:title;white-space:normal;overflow:visible;text-overflow:clip;}
    .task-top .status{grid-area:status;justify-self:center;}
    .task-top .due{grid-area:due;justify-self:end;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="now-bar" id="now-bar"></div>

  <div class="head-row">
    <div>
      <div class="title-row">
        <h1>경영지원실 주간업무 대시보드</h1>
        <span class="week-tag" id="week-tag">2026년 7월 2주차</span>
        <span class="archive-badge" id="archive-badge">지난 기록 · 읽기전용</span>
      </div>
    </div>
    <div class="head-right">
      <select class="week-select" id="week-select" onchange="onWeekChange()"></select>
      <div class="sync-row">
        <span class="sync-time" id="sync-time"></span>
        <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">↻ 새로고침</button>
      </div>
    </div>
  </div>

  <div class="kpis">
    <div class="kpi total"><div class="num" id="k-total">-</div><div class="lbl">전체 업무</div></div>
    <div class="kpi"><div class="num" id="k-done">-</div><div class="lbl">완료</div></div>
    <div class="kpi prog"><div class="num" id="k-prog">-</div><div class="lbl">진행중</div></div>
    <div class="kpi wait"><div class="num" id="k-wait">-</div><div class="lbl">예정·확인중</div></div>
    <div class="kpi overdue"><div class="num" id="k-overdue">-</div><div class="lbl">마감 지남</div></div>
    <div class="kpi"><div class="num" id="k-empty">-</div><div class="lbl">이번주 업무 미입력</div></div>
  </div>

  <div class="search-row">
    <input type="text" class="search-input" id="search-input" placeholder="업무명 또는 담당자로 검색..." oninput="onSearchInput()">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>

  <div class="filters-row">
    <div class="filter-line">
      <span class="filter-label">상태</span>
      <div class="filters" id="filters"></div>
      <button class="toggle-all-btn" id="toggle-dept-btn" onclick="toggleAllDepts()">부서 전체 접기</button>
      <button class="toggle-all-btn" id="toggle-all-btn" onclick="toggleAll()">전체 펼치기</button>
      <button class="toggle-all-btn" id="view-toggle-btn" onclick="toggleViewMode()">표로 보기</button>
    </div>
    <div class="filter-line">
      <span class="filter-label">담당자</span>
      <div class="filters" id="owner-filters"></div>
    </div>
  </div>

  <div id="list">
    <div class="state-msg" id="initial-msg">스프레드시트에서 데이터를 불러오는 중...</div>
  </div>

</div>

<script>
// ===== 구글 스프레드시트 연동 설정 =====
const SHEET_ID = '1nLHE0Y6tJftFsJlU9czhd-VWG-HbXEk3ndZslar_jbQ';
const HEADER_RANGE = 'B7:L200'; // B7:L7이 헤더, 8행부터 데이터
const WEEK_LABEL_CELL = 'B1'; // 이 셀에 "2026년 7월 3주차"처럼 입력하면 자동 반영됨
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5분마다 자동 새로고침 (최신 주차에서만 동작)

// ===== 지난 주차 아카이브 설정 =====
// 스프레드시트 안에 주차별로 탭(시트)을 만들어두고, 각 탭의 gid를 아래에 추가하면
// 상단 드롭다운에서 해당 주차 데이터를 그대로 불러와 볼 수 있습니다.
// 배열의 첫 번째 항목이 "이번 주(최신)"로 취급되어 자동 새로고침이 적용됩니다.
// gid는 구글시트 탭을 열었을 때 주소창의 '#gid=숫자' 부분에서 확인할 수 있습니다.
const WEEKS = [
  { gid: '1682390790', label: '2026년 7월 3주차 (이번 주)' },
  { gid: '0', label: '2026년 7월 2주차' },
  { gid: '1256845414', label: '2026년 7월 1주차' },
  { gid: '1854663232', label: '2026년 6월 4주차' },
];

let CURRENT_WEEK_INDEX = 0;

async function fetchWeekLabel(gid){
  try{
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}&range=${WEEK_LABEL_CELL}`;
    const res = await fetch(url);
    const text = await res.text();
    const jsonStart = text.indexOf('{');
    const jsonEnd = text.lastIndexOf('}');
    const json = JSON.parse(text.substring(jsonStart, jsonEnd + 1));
    const cell = json.table.rows && json.table.rows[0] && json.table.rows[0].c && json.table.rows[0].c[0];
    const label = cell ? String(cell.v ?? '').trim() : '';
    if(label){
      document.getElementById('week-tag').textContent = label;
    }
  }catch(err){
    console.error('주차 라벨을 불러오지 못했습니다:', err);
    // 실패해도 기존 라벨을 그대로 유지
  }
}

let tasks = [];
let activeStatus = "전체";
let activeOwner = "전체";
let viewMode = "card"; // 'card' | 'table'
let searchText = "";
let searchDebounceTimer = null;
let collapsedDepts = new Set();

function updateNowBar(){
  const now = new Date();
  const weekdays = ['일','월','화','수','목','금','토'];
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const d = now.getDate();
  const w = weekdays[now.getDay()];
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const el = document.getElementById('now-bar');
  if(el){
    el.innerHTML = `<span class="now-date">${y}년 ${m}월 ${d}일 (${w})</span><span class="now-dot">·</span><span class="now-time">${hh}:${mm}:${ss}</span>`;
  }
}
updateNowBar();
setInterval(updateNowBar, 1000);

function initWeekSelect(){
  const sel = document.getElementById('week-select');
  sel.innerHTML = "";
  WEEKS.forEach((w, i)=>{
    const opt = document.createElement('option');
    opt.value = String(i);
    opt.textContent = w.label;
    sel.appendChild(opt);
  });
  sel.value = String(CURRENT_WEEK_INDEX);
}

function onWeekChange(){
  const sel = document.getElementById('week-select');
  CURRENT_WEEK_INDEX = Number(sel.value);
  // 주차를 바꾸면 검색/필터 상태는 초기화해서 혼동을 방지
  activeStatus = "전체";
  activeOwner = "전체";
  searchText = "";
  collapsedDepts = new Set();
  const input = document.getElementById('search-input');
  if(input) input.value = "";
  loadAndRender();
}

function currentGid(){
  return WEEKS[CURRENT_WEEK_INDEX].gid;
}

function isArchiveWeek(){
  return CURRENT_WEEK_INDEX !== 0;
}

async function fetchTasksFromSheet(gid){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}&range=${HEADER_RANGE}&headers=1`;
  const res = await fetch(url);
  if(!res.ok) throw new Error('스프레드시트 응답 오류 (' + res.status + ')');
  const text = await res.text();
  const jsonStart = text.indexOf('{');
  const jsonEnd = text.lastIndexOf('}');
  const json = JSON.parse(text.substring(jsonStart, jsonEnd + 1));

  const rows = json.table.rows || [];
  const result = [];

  rows.forEach(r=>{
    const c = r.c;
    const get = (i)=>{
      if(!c || !c[i]) return '';
      const cell = c[i];
      return (cell.f !== undefined && cell.f !== null && cell.f !== '') ? cell.f : (cell.v ?? '');
    };
    // 열 순서: 부서, 업무구분, 담당자, 업무명, 업무 설명, 세부내용, 지난주 업무, 이번주 업무, 다음주 업무, 상태, 마감일
    const dept   = String(get(0)).trim();
    const cat    = String(get(1)).trim();
    const owner  = String(get(2)).trim();
    const title  = String(get(3)).trim();
    const descMain   = String(get(4)).trim();
    const descDetail = String(get(5)).trim();
    const last   = String(get(6)).trim();
    const next   = String(get(7)).trim();
    const remark = String(get(8)).trim();
    const status = String(get(9)).trim();
    const due    = String(get(10)).trim();

    if(!title) return; // 업무명이 없는 빈 행은 건너뜀

    const cleanText = (s)=> s
      .split('\n')
      .map(line => line.trim())
      .filter(line => line.length > 0)
      .join('\n');

    const desc = [cleanText(descMain), cleanText(descDetail)].filter(Boolean).join('\n');
    result.push({dept, cat, owner, title, desc, last, next, status, due, remark: cleanText(remark)});
  });

  return result;
}

function renderKpis(){
  document.getElementById('k-total').textContent = tasks.length;
  document.getElementById('k-done').textContent = tasks.filter(t=>t.status==='완료').length;
  document.getElementById('k-prog').textContent = tasks.filter(t=>t.status==='진행중').length;
  document.getElementById('k-wait').textContent = tasks.filter(t=>t.status==='예정'||t.status==='확인중').length;
  document.getElementById('k-overdue').textContent = tasks.filter(t=>dueUrgency(t).cls==='overdue').length;
  document.getElementById('k-empty').textContent = tasks.filter(t=>!t.next).length;
}

function renderFilters(){
  const statuses = ["전체", ...Array.from(new Set(tasks.map(t=>t.status).filter(Boolean)))];
  const filterBar = document.getElementById('filters');
  filterBar.innerHTML = "";
  statuses.forEach(s=>{
    const chip = document.createElement('div');
    chip.className = 'chip' + (s===activeStatus ? ' active' : '');
    chip.textContent = s + (s!=="전체" ? ` (${tasks.filter(t=>t.status===s).length})` : ` (${tasks.length})`);
    chip.onclick = ()=>{ activeStatus = s; renderFilters(); renderOwnerFilters(); renderList(); };
    filterBar.appendChild(chip);
  });
}

function renderOwnerFilters(){
  // 담당자 목록은 현재 선택된 상태 필터를 반영해 등장 순서대로 구성
  const statusScoped = tasks.filter(t => activeStatus==="전체" || t.status===activeStatus);
  const owners = ["전체", ...Array.from(new Set(statusScoped.map(t=>t.owner || '미지정').filter(Boolean)))];
  const bar = document.getElementById('owner-filters');
  bar.innerHTML = "";

  // 이전에 선택한 담당자가 더 이상 목록에 없으면 전체로 리셋
  if(!owners.includes(activeOwner)) activeOwner = "전체";

  owners.forEach(o=>{
    const chip = document.createElement('div');
    chip.className = 'chip owner-chip' + (o===activeOwner ? ' active' : '');
    const count = o==="전체" ? statusScoped.length : statusScoped.filter(t=>(t.owner || '미지정')===o).length;
    chip.textContent = o + ` (${count})`;
    chip.onclick = ()=>{ activeOwner = o; renderOwnerFilters(); renderList(); };
    bar.appendChild(chip);
  });
}

function isDateLikeDue(due){
  if(!due) return false;
  // YYYY-MM-DD, YYYY.MM.DD, YYYY/MM/DD, M/D, MM-DD 등 날짜 형식만 인정
  return /^\d{4}[-.\/]\d{1,2}[-.\/]\d{1,2}$/.test(due) || /^\d{1,2}[-.\/]\d{1,2}$/.test(due);
}

function formatDue(due){
  if(!due) return '마감 -';
  return isDateLikeDue(due) ? ('마감 ' + due) : due;
}

function parseDueDate(due){
  if(!due) return null;
  let m = due.match(/^(\d{4})[-.\/](\d{1,2})[-.\/](\d{1,2})$/);
  if(m){
    return new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
  }
  m = due.match(/^(\d{1,2})[-.\/](\d{1,2})$/);
  if(m){
    const now = new Date();
    return new Date(now.getFullYear(), Number(m[1]) - 1, Number(m[2]));
  }
  return null;
}

// 마감 임박/지연 여부를 계산. 완료 업무는 강조하지 않음.
function dueUrgency(t){
  if(t.status === '완료') return { cls:'', suffix:'' };
  const d = parseDueDate(t.due);
  if(!d) return { cls:'', suffix:'' };
  const today = new Date();
  today.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  if(diffDays < 0) return { cls:'overdue', suffix:` · 지연 ${Math.abs(diffDays)}일` };
  if(diffDays === 0) return { cls:'soon', suffix:' · D-day' };
  if(diffDays <= 3) return { cls:'soon', suffix:` · D-${diffDays}` };
  return { cls:'', suffix:'' };
}

function escapeRegExp(s){
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, term){
  if(!term) return text;
  try{
    const re = new RegExp('(' + escapeRegExp(term) + ')', 'gi');
    return text.replace(re, '<mark>$1</mark>');
  }catch(e){
    return text;
  }
}

function matchesSearch(t, term){
  if(!term) return true;
  const q = term.toLowerCase();
  return t.title.toLowerCase().includes(q) || (t.owner || '').toLowerCase().includes(q);
}

function onSearchInput(){
  const val = document.getElementById('search-input').value;
  document.getElementById('search-clear').classList.toggle('show', val.length > 0);
  clearTimeout(searchDebounceTimer);
  searchDebounceTimer = setTimeout(()=>{
    searchText = val.trim();
    renderList();
  }, 150);
}

function clearSearch(){
  const input = document.getElementById('search-input');
  input.value = "";
  searchText = "";
  document.getElementById('search-clear').classList.remove('show');
  input.focus();
  renderList();
}

function getFilteredTasks(){
  const term = searchText;
  return tasks.filter(t=>
    (activeStatus==="전체" || t.status===activeStatus) &&
    (activeOwner==="전체" || (t.owner || '미지정')===activeOwner) &&
    matchesSearch(t, term)
  );
}

// 부서 정렬 순서 (DEPT_ORDER에 지정된 부서 우선, 나머지는 등장 순서대로 뒤에 붙임)
const DEPT_ORDER = ['인사', '총무'];
function sortedDeptKeys(deptGroups){
  return Array.from(deptGroups.keys()).sort((a, b)=>{
    const ia = DEPT_ORDER.indexOf(a);
    const ib = DEPT_ORDER.indexOf(b);
    if(ia === -1 && ib === -1) return 0;
    if(ia === -1) return 1;
    if(ib === -1) return -1;
    return ia - ib;
  });
}

function renderList(){
  if(viewMode === 'table'){
    renderTableView();
  }else{
    renderCardView();
  }
}

function renderCardView(){
  const list = document.getElementById('list');
  list.innerHTML = "";
  const term = searchText;
  const shown = getFilteredTasks();

  if(shown.length === 0){
    list.innerHTML = `<div class="state-msg">${term ? '검색 결과가 없습니다.' : '표시할 업무가 없습니다.'}</div>`;
    return;
  }

  // 부서별로 그룹화. DEPT_ORDER에 지정된 순서 우선, 나머지는 등장 순서대로 뒤에 붙임
  const deptGroups = new Map();
  shown.forEach(t=>{
    const key = t.dept || '기타';
    if(!deptGroups.has(key)) deptGroups.set(key, []);
    deptGroups.get(key).push(t);
  });

  const deptKeys = sortedDeptKeys(deptGroups);

  deptKeys.forEach(deptKey=>{
    const items = deptGroups.get(deptKey);

    const section = document.createElement('details');
    section.className = 'dept-section';
    const hasMatch = term && items.some(t=> t.title.toLowerCase().includes(term.toLowerCase()) || (t.owner||'').toLowerCase().includes(term.toLowerCase()));
    section.open = hasMatch ? true : !collapsedDepts.has(deptKey);
    const summary = document.createElement('summary');
    summary.className = 'dept-header';
    summary.innerHTML = `
        <span class="dept-chevron">▶</span>
        <span class="dept-name">${deptKey}</span>
        <span class="dept-count">${items.length}건</span>
        <button type="button" class="dept-expand-btn">${deptKey} 전체 펼치기</button>`;
    summary.querySelector('.dept-expand-btn').addEventListener('click', (e)=>{
      e.preventDefault();
      e.stopPropagation();
      toggleDeptTasks(section, deptKey, e.currentTarget);
    });
    section.appendChild(summary);

    const deptBody = document.createElement('div');
    deptBody.className = 'dept-body';
    section.appendChild(deptBody);

    // 담당자별로 그룹화 (등장 순서 유지)
    const ownerGroups = new Map();
    items.forEach(t=>{
      const key = t.owner || '미지정';
      if(!ownerGroups.has(key)) ownerGroups.set(key, []);
      ownerGroups.get(key).push(t);
    });

    ownerGroups.forEach((ownerItems, ownerName)=>{
      const ownerBlock = document.createElement('div');
      ownerBlock.className = 'owner-group';
      ownerBlock.innerHTML = `
        <div class="owner-header">
          <span class="owner-name">${highlight(ownerName, term)}</span>
          <span class="owner-count">${ownerItems.length}건</span>
        </div>`;

      ownerItems.forEach(t=>{
        const el = document.createElement('details');
        el.className = 'task';
        // 검색어로 찾은 카드는 펼쳐서 바로 보이게 함
        if(term && (t.title.toLowerCase().includes(term.toLowerCase()) || (t.owner||'').toLowerCase().includes(term.toLowerCase()))){
          el.open = true;
        }
        const statusClass = (t.status || '').replace(/[^\p{L}\p{N}]/gu, '');
        el.innerHTML = `
          <summary>
            <div class="task-top">
              <span class="tag">${t.cat}</span>
              <span class="title">${highlight(t.title, term)}</span>
              <span class="status ${statusClass}">${t.status || '-'}</span>
              <span class="due ${dueUrgency(t).cls}">${formatDue(t.due)}${dueUrgency(t).suffix}</span>
              <span class="chevron">▶</span>
            </div>
          </summary>
          <div class="task-body">
            ${t.desc ? `<div class="desc">${t.desc}</div>` : ""}
            <div class="flow">
              <div class="box last"><span class="lbl">지난주 업무</span>${t.last ? t.last : '<span class="empty">지난주 업무 내용 없음</span>'}</div>
              <div class="arrow">→</div>
              <div class="box next"><span class="lbl">이번주 업무</span>${t.next ? t.next : '<span class="empty">이번주 업무 미입력</span>'}</div>
              <div class="arrow">→</div>
              <div class="box remark"><span class="lbl">다음주 업무</span>${t.remark ? t.remark : '<span class="empty">다음주 업무 내용 없음</span>'}</div>
            </div>
          </div>`;
        ownerBlock.appendChild(el);
      });

      deptBody.appendChild(ownerBlock);
    });

    list.appendChild(section);
  });

  updateToggleAllBtn();
  updateToggleDeptBtn();
}

function renderTableView(){
  const list = document.getElementById('list');
  list.innerHTML = "";
  const term = searchText;
  const shown = getFilteredTasks();

  if(shown.length === 0){
    list.innerHTML = `<div class="state-msg">${term ? '검색 결과가 없습니다.' : '표시할 업무가 없습니다.'}</div>`;
    return;
  }

  // 카드 보기와 동일하게 부서 → 담당자 순서를 유지
  const deptGroups = new Map();
  shown.forEach(t=>{
    const key = t.dept || '기타';
    if(!deptGroups.has(key)) deptGroups.set(key, []);
    deptGroups.get(key).push(t);
  });
  const deptKeys = sortedDeptKeys(deptGroups);

  const rows = [];
  deptKeys.forEach(deptKey=>{
    const items = deptGroups.get(deptKey);
    const ownerGroups = new Map();
    items.forEach(t=>{
      const key = t.owner || '미지정';
      if(!ownerGroups.has(key)) ownerGroups.set(key, []);
      ownerGroups.get(key).push(t);
    });
    ownerGroups.forEach((ownerItems, ownerName)=>{
      ownerItems.forEach(t=> rows.push({dept: deptKey, owner: ownerName, task: t}));
    });
  });

  const cell = (text)=> text ? highlight(text, term) : '<span class="empty-cell">내용 없음</span>';

  const bodyRows = rows.map(r=>{
    const t = r.task;
    return `
      <tr>
        <td class="dept-cell">${r.dept}</td>
        <td class="owner-cell">${highlight(r.owner, term)}</td>
        <td class="title-cell">${highlight(t.title, term)}</td>
        <td>${cell(t.last)}</td>
        <td>${cell(t.next)}</td>
        <td>${cell(t.remark)}</td>
      </tr>`;
  }).join('');

  list.innerHTML = `
    <div class="table-wrap">
      <table class="summary-table">
        <colgroup>
          <col class="col-dept"><col class="col-owner"><col class="col-title">
          <col class="col-flow"><col class="col-flow"><col class="col-flow">
        </colgroup>
        <thead>
          <tr>
            <th>부서</th><th>담당자</th><th>업무명</th>
            <th>지난주 업무</th><th>이번주 업무</th><th>다음주 업무</th>
          </tr>
        </thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
}

function toggleViewMode(){
  viewMode = viewMode === 'table' ? 'card' : 'table';
  updateViewToggleBtn();
  renderList();
}

function updateViewToggleBtn(){
  const btn = document.getElementById('view-toggle-btn');
  if(!btn) return;
  btn.textContent = viewMode === 'table' ? '카드로 보기' : '표로 보기';
  const deptBtn = document.getElementById('toggle-dept-btn');
  const allBtn = document.getElementById('toggle-all-btn');
  if(deptBtn) deptBtn.style.display = viewMode === 'table' ? 'none' : '';
  if(allBtn) allBtn.style.display = viewMode === 'table' ? 'none' : '';
}

function updateSyncTime(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  if(isArchiveWeek()){
    document.getElementById('sync-time').textContent = `아카이브 보기 · ${hh}:${mm} 조회`;
  }else{
    document.getElementById('sync-time').textContent = `마지막 업데이트 ${hh}:${mm}`;
  }
}

let autoRefreshTimer = null;

async function loadAndRender(){
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  document.getElementById('archive-badge').classList.toggle('show', isArchiveWeek());
  try{
    const gid = currentGid();
    const [taskResult] = await Promise.all([fetchTasksFromSheet(gid), fetchWeekLabel(gid)]);
    tasks = taskResult;
    renderKpis();
    renderFilters();
    renderOwnerFilters();
    renderList();
    updateSyncTime();
  }catch(err){
    document.getElementById('list').innerHTML =
      `<div class="state-msg error">데이터를 불러오지 못했습니다.<br>스프레드시트 공유 설정("링크가 있는 모든 사용자" 뷰어)을 확인해 주세요.<br><small>${err.message}</small></div>`;
    console.error(err);
  }finally{
    btn.disabled = false;
  }

  // 자동 새로고침은 "이번 주" 탭에서만 동작 (지난 주차 아카이브는 고정된 기록이므로 갱신하지 않음)
  clearInterval(autoRefreshTimer);
  if(!isArchiveWeek()){
    autoRefreshTimer = setInterval(loadAndRender, AUTO_REFRESH_MS);
  }
}

function toggleAll(){
  const items = document.querySelectorAll('#list .task');
  if(items.length === 0) return;
  const shouldOpen = Array.from(items).some(el => !el.open);
  items.forEach(el => { el.open = shouldOpen; });
  updateToggleAllBtn();
}

function updateToggleAllBtn(){
  const btn = document.getElementById('toggle-all-btn');
  if(!btn) return;
  const items = document.querySelectorAll('#list .task');
  if(items.length === 0){ btn.textContent = '전체 펼치기'; return; }
  const allOpen = Array.from(items).every(el => el.open);
  btn.textContent = allOpen ? '전체 접기' : '전체 펼치기';
}

function toggleDeptTasks(section, deptName, btnEl){
  const taskEls = section.querySelectorAll('.task');
  if(taskEls.length === 0) return;
  const shouldOpen = Array.from(taskEls).some(el => !el.open);
  taskEls.forEach(el => { el.open = shouldOpen; });
  if(shouldOpen && !section.open){
    section.open = true;
    collapsedDepts.delete(deptName);
  }
  btnEl.textContent = deptName + (shouldOpen ? ' 전체 접기' : ' 전체 펼치기');
  updateToggleAllBtn();
  updateToggleDeptBtn();
}

function toggleAllDepts(){
  const items = document.querySelectorAll('#list .dept-section');
  if(items.length === 0) return;
  const shouldOpen = Array.from(items).some(el => !el.open);
  items.forEach(el => {
    el.open = shouldOpen;
    const deptKey = el.querySelector('.dept-name')?.textContent || '';
    if(shouldOpen){ collapsedDepts.delete(deptKey); } else { collapsedDepts.add(deptKey); }
  });
  updateToggleDeptBtn();
}

function updateToggleDeptBtn(){
  const btn = document.getElementById('toggle-dept-btn');
  if(!btn) return;
  const items = document.querySelectorAll('#list .dept-section');
  if(items.length === 0){ btn.textContent = '부서 전체 접기'; return; }
  const allOpen = Array.from(items).every(el => el.open);
  btn.textContent = allOpen ? '부서 전체 접기' : '부서 전체 펼치기';
}

function manualRefresh(){
  loadAndRender();
}

document.getElementById('list').addEventListener('toggle', (e)=>{
  if(e.target.classList && e.target.classList.contains('task')){
    updateToggleAllBtn();
  }
  if(e.target.classList && e.target.classList.contains('dept-section')){
    const deptKey = e.target.querySelector('.dept-name')?.textContent || '';
    if(e.target.open){
      collapsedDepts.delete(deptKey);
    }else{
      collapsedDepts.add(deptKey);
    }
    updateToggleDeptBtn();
  }
}, true);

initWeekSelect();
loadAndRender();
</script>
